# ──────────────────────────────────────────────────────────
#  Dikenocracy — Nginx production configuration
#  Deploy: /etc/nginx/sites-available/dikenocracy.com
#  Symlink: ln -s /etc/nginx/sites-available/dikenocracy.com /etc/nginx/sites-enabled/
#  Test:    nginx -t && systemctl reload nginx
# ──────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect ────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name dikenocracy.com www.dikenocracy.com;
    return 301 https://dikenocracy.com$request_uri;
}

# ── www → bare domain redirect ───────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.dikenocracy.com;

    ssl_certificate     /etc/letsencrypt/live/dikenocracy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dikenocracy.com/privkey.pem;

    return 301 https://dikenocracy.com$request_uri;
}

# ── Main site ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dikenocracy.com;

    # ── SSL ──────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/dikenocracy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dikenocracy.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ─────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Root ─────────────────────────────────────────────
    root /var/www/dikenocracy.com;
    index index.html;
    charset utf-8;

    # ── Gzip ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Static asset caching ─────────────────────────────
    location ~* \.(webp|ico|png|jpg|jpeg|gif|svg|woff2?|ttf|eot|otf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Converter DTI reverse proxy ──────────────────────
    # Uncomment when Streamlit is running on the server:
    # location /converter/ {
    #     proxy_pass         http://127.0.0.1:8501/;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Upgrade $http_upgrade;
    #     proxy_set_header   Connection "upgrade";
    #     proxy_set_header   Host $host;
    #     proxy_set_header   X-Real-IP $remote_addr;
    #     proxy_read_timeout 86400;
    # }

    # ── Custom 404 ───────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ── Block dotfiles (except .well-known for ACME) ─────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ^~ /.well-known/ {
        allow all;
    }

    # ── Default try ──────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    # ── Logs ─────────────────────────────────────────────
    access_log /var/log/nginx/dikenocracy.access.log;
    error_log  /var/log/nginx/dikenocracy.error.log warn;
}
